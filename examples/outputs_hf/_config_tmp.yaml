project:
  name: proteinnet-transformer-ca
  notes: Transformer encoder predicting C-alpha coordinates from sequence + evolutionary
    profile (ProteinNet CASP12).
data:
  processed_dir: /scratch/mtiwar26/proteinnet/data/processed/casp12/train_90
  max_length: 1024
model:
  vocab_size: 22
  evo_dim: 21
  d_model: 256
  n_heads: 8
  n_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
train:
  epochs: 100
  batch_size: 4
  num_workers: 4
  lr: 0.0003
  weight_decay: 0.01
  grad_clip_norm: 1.0
  amp: true
  seed: 42
  run_dir: runs
  save_every_steps: 500
  keep_last_k: 3
  resume: auto
  log_every_steps: 50
  validate_every_epochs: 1
  gradient_accumulation: 1
  align_loss: true
  evo_dropout_prob: 0.3
scheduler:
  name: cosine
  warmup_steps: 2000
  min_lr: 1.0e-06
